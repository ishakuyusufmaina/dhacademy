function promptYouTubeURL() {
  return new Promise((resolve) => {
    // ===== Overlay =====
    const overlay = document.createElement('div');
    overlay.style.position = 'fixed';
    overlay.style.top = 0;
    overlay.style.left = 0;
    overlay.style.width = '100%';
    overlay.style.height = '100%';
    overlay.style.background = 'rgba(0,0,0,0.6)';
    overlay.style.display = 'flex';
    overlay.style.alignItems = 'center';
    overlay.style.justifyContent = 'center';
    overlay.style.zIndex = 9999;

    // ===== Modal =====
    const modal = document.createElement('div');
    modal.style.width = '420px';
    modal.style.background = '#fff';
    modal.style.borderRadius = '12px';
    modal.style.padding = '20px';
    modal.style.boxShadow = '0 10px 30px rgba(0,0,0,0.2)';
    modal.style.fontFamily = 'Arial, sans-serif';

    // ===== Title =====
    const title = document.createElement('h3');
    title.innerText = 'Insert YouTube Video';
    title.style.margin = '0 0 10px 0';

    // ===== Description =====
    const desc = document.createElement('p');
    desc.innerText = 'Paste a YouTube video URL below:';
    desc.style.fontSize = '13px';
    desc.style.color = '#555';

    // ===== Input =====
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'https://youtube.com/watch?v=...';
    input.style.width = '100%';
    input.style.padding = '10px';
    input.style.marginTop = '10px';
    input.style.border = '1px solid #ccc';
    input.style.borderRadius = '6px';
    input.style.outline = 'none';

    // ===== Button Row =====
    const btnRow = document.createElement('div');
    btnRow.style.display = 'flex';
    btnRow.style.justifyContent = 'flex-end';
    btnRow.style.gap = '10px';
    btnRow.style.marginTop = '15px';

    // ===== Cancel Button =====
    const cancelBtn = document.createElement('button');
    cancelBtn.innerText = 'Cancel';
    cancelBtn.style.padding = '8px 12px';
    cancelBtn.style.border = 'none';
    cancelBtn.style.borderRadius = '6px';
    cancelBtn.style.cursor = 'pointer';
    cancelBtn.style.background = '#eee';

    // ===== Insert Button =====
    const insertBtn = document.createElement('button');
    insertBtn.innerText = 'Insert';
    insertBtn.style.padding = '8px 12px';
    insertBtn.style.border = 'none';
    insertBtn.style.borderRadius = '6px';
    insertBtn.style.cursor = 'pointer';
    insertBtn.style.background = '#2d6cdf';
    insertBtn.style.color = '#fff';

    // ===== Validation =====
    function isValidYouTube(url) {
      return /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/.test(url);
    }

    // ===== Cleanup =====
    function close(value) {
      document.body.removeChild(overlay);
      resolve(value);
    }

    // ===== Events =====
    cancelBtn.onclick = () => close(null);

    insertBtn.onclick = () => {
      const value = input.value.trim();

      if (!value || !isValidYouTube(value)) {
        input.style.border = '1px solid red';
        return;
      }

      close(value);
    };

    // ESC key support
    window.addEventListener('keydown', function esc(e) {
      if (e.key === 'Escape') {
        window.removeEventListener('keydown', esc);
        close(null);
      }
    });

    // ===== Build UI =====
    btnRow.appendChild(cancelBtn);
    btnRow.appendChild(insertBtn);

    modal.appendChild(title);
    modal.appendChild(desc);
    modal.appendChild(input);
    modal.appendChild(btnRow);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    input.focus();
  });
}

async function getFileContent(fileId, accessToken) {
    if (!fileId) {
        throw new Error("Missing file ID");
    }

    const res = await fetch(
        `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
        {
            headers: {
                Authorization: `Bearer ${accessToken}`
            }
        }
    );

    const text = await res.text();

    if (!res.ok) {
        throw new Error(text);
    }

    try {
        return JSON.parse(text);
    } catch {
        return text;
    }
}
  async function updateFileContent(fileId, content, accessToken) {
    if (!fileId) {
        throw new Error("Missing file ID");
    }

    const boundary = "----drive_boundary_" + Date.now();

    const metadata = {
        mimeType: "application/json"
    };

    const body = [
        `--${boundary}`,
        "Content-Type: application/json; charset=UTF-8",
        "",
        JSON.stringify(metadata),
        `--${boundary}`,
        "Content-Type: application/json",
        "",
        JSON.stringify(content),
        `--${boundary}--`
    ].join("\r\n");

    const res = await fetch(
        `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&supportsAllDrives=true`,
        {
            method: "PATCH",
            headers: {
                Authorization: `Bearer ${accessToken}`,
                "Content-Type": `multipart/related; boundary=${boundary}`
            },
            body
        }
    );

    const data = await res.json();

    if (!res.ok) {
        throw new Error(
            data.error?.message || JSON.stringify(data)
        );
    }

    return data;
}
  
  
  


/**
 * Fetch new token from server
 */
async function updateToken() {
    try {
        const res = await fetch(TOKEN_URL);
        const data = await res.json();

        if (!data.access_token) {
            throw new Error("Invalid token response");
        }

        cachedToken = data.access_token;

        // expires_in is in seconds → convert to ms and subtract small buffer (30s safety)
        tokenExpiry = Date.now() + (data.expires_in * 1000) - 30000;

        // optional: persist
        localStorage.setItem("gd_token", cachedToken);
        localStorage.setItem("gd_token_expiry", tokenExpiry);

        console.log("Token updated");
        return cachedToken;

    } catch (e) {
        console.error("Token update error:", e.message);
        throw e;
    }
}

/**
 * Get valid token (auto-refresh if expired or missing)
 */
async function getToken() {
    const savedToken = localStorage.getItem("gd_token");
    const savedExpiry = Number(localStorage.getItem("gd_token_expiry"));

    if (savedToken && savedExpiry && Date.now() < savedExpiry) {
        cachedToken = savedToken;
        tokenExpiry = savedExpiry;
        return cachedToken;
    }

    return await updateToken();
}
