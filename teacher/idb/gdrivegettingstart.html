<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Google Drive Browser-Only Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        button {
            padding: 10px 15px;
            margin-right: 10px;
        }

        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Google Drive Browser Demo</h2>

<button id="authorizeBtn">Authorize</button>
<button id="signoutBtn" hidden>Sign Out</button>

<pre id="output">Not authorized.</pre>

<script>
    // Replace with your OAuth Client ID
    const CLIENT_ID = "118527147839-fqqv4h9vp7nb128ro7eut77784q5rlq8.apps.googleusercontent.com";

    const SCOPES =
        "https://www.googleapis.com/auth/drive.metadata.readonly";

    let accessToken = null;
    let tokenClient;

    const authorizeBtn = document.getElementById("authorizeBtn");
    const signoutBtn = document.getElementById("signoutBtn");
    const output = document.getElementById("output");

    function initGIS() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: async (response) => {
                if (response.error) {
                    console.error(response);
                    return;
                }

                accessToken = response.access_token;

                authorizeBtn.textContent = "Refresh";
                signoutBtn.hidden = false;

                await listFiles();
            }
        });
    }

    authorizeBtn.addEventListener("click", () => {
        tokenClient.requestAccessToken({
            prompt: accessToken ? "" : "consent"
        });
    });

    signoutBtn.addEventListener("click", () => {
        if (!accessToken) return;

        google.accounts.oauth2.revoke(accessToken);

        accessToken = null;

        output.textContent = "Signed out.";
        authorizeBtn.textContent = "Authorize";
        signoutBtn.hidden = true;
    });

    async function listFiles() {
        try {
            const response = await fetch(
                "https://www.googleapis.com/drive/v3/files?pageSize=10&fields=files(id,name)",
                {
                    headers: {
                        Authorization: `Bearer ${accessToken}`
                    }
                }
            );

            const data = await response.json();

            if (!data.files || data.files.length === 0) {
                output.textContent = "No files found.";
                return;
            }

            let text = "Files:\n\n";

            data.files.forEach(file => {
                text += `${file.name} (${file.id})\n`;
            });

            output.textContent = text;

        } catch (error) {
            output.textContent = error.message;
        }
    }
</script>

<script
    src="https://accounts.google.com/gsi/client"
    async
    defer
    onload="initGIS()">
</script>

</body>
</html>
