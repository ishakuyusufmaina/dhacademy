    function convertToHTML(content) {
    // 1. Convert headings
    content = content.replace(/^(\#{1,6})\s*(.+)$/gm, (match, hashes, text) => {
        const level = hashes.length;
        return `<h${level}>${text}</h${level}>`;
    });


        // 2. Convert assessment blocks
    content = content.replace(/--\s*\n([\s\S]+?)\n--/g, (match, inner) => {
        return `<div class="assessment">\n${inner.trim()}\n</div>`;
    });
            // 2. Convert assessment blocks
    content = content.replace(/-\s*\n([\s\S]+?)\n-/g, (match, inner) => {
        return `<div class="assessment">\n${inner.trim()}\n</div>`;
    });

    // 3. Convert {{}} to input fields (innermost first)
    const inputRegex = /\{\{([^\{\}]*)\}\}/g;
    while (inputRegex.test(content)) {
        content = content.replace(inputRegex, (match, inner) => {
            const width = inner.length || 1;
            return `<input style="width:${width}ch">`;
        });
    }

    return content;
}

async function getLastDocument(className, subjectName) {
  const q = query(
    collection(db, schoolId, "db", "contents"),
    where("class", "==", className),
    where("subject", "==", subjectName),
    orderBy("timestamp", "desc"),
    limit(1)
  );

  const querySnapshot = await getDocs(q);
  if (!querySnapshot.empty) {
    return querySnapshot.docs[0]; //.data(); // returns the last document data
  } else {
    return null; // no matching documents
  }
}
